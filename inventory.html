<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bonds Mall Inventory</title>
<link rel="stylesheet" href="bondsmall.css">
<link rel="stylesheet" href="site-footer.css">
<script src="category-menu.js" defer></script>
<style>
  :root {
    --good: #1f7a46;
    --warn: #8c2f39;
    --accent: #d4a373;
    --line: #d9ccbe;
    --surface: #fffdf8;
    --ink: #1f1a14;
    --muted: #6b5f52;
  }

  body.modal-open {
    overflow: hidden;
  }

  .page {
    width: min(1180px, calc(100% - 2rem));
    margin: 2rem auto 3rem;
  }

  .page-head {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 1.2rem;
  }

  .page h1 {
    margin: 0;
    font-size: clamp(2rem, 5vw, 3.6rem);
    line-height: 0.95;
    letter-spacing: 0;
  }

  .page-subtitle {
    margin: 0.45rem 0 0;
    color: var(--muted);
  }

  .toolbar {
    display: grid;
    grid-template-columns: auto minmax(220px, 1fr) auto auto auto auto;
    gap: 0.75rem;
    align-items: center;
    padding: 0.9rem;
    border: 1px solid var(--line);
    background: rgba(255, 253, 248, 0.78);
    border-radius: 10px;
    margin-bottom: 0.75rem;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    min-height: 42px;
    padding: 0 0.85rem;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
    font: inherit;
    font-size: 0.82rem;
    font-weight: 800;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s ease, border-color 0.15s ease;
  }

  .btn:hover {
    background: #f5ede2;
  }

  .btn--primary {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }

  .btn--primary:hover {
    background: #332b22;
  }

  .btn--github {
    border-color: #24292e;
    color: #24292e;
  }

  .btn--github.is-active {
    background: #f6f8fa;
    border-color: #1f7a46;
    color: #1f7a46;
  }

  .toolbar-search {
    width: 100%;
    min-height: 42px;
    padding: 0 0.9rem;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: #fff;
    color: var(--ink);
    font: inherit;
    outline: none;
  }

  .status {
    min-height: 1.35rem;
    margin: 0.75rem 0;
    color: var(--muted);
    font-size: 0.95rem;
  }

  .table-wrap {
    overflow: auto;
    border: 1px solid var(--line);
    background: rgba(255, 253, 248, 0.86);
    border-radius: 10px;
  }

  table {
    width: 100%;
    min-width: 850px;
    border-collapse: collapse;
  }

  th, td {
    padding: 0.82rem 0.75rem;
    border-bottom: 1px solid var(--line);
    text-align: left;
    vertical-align: middle;
  }

  th {
    background: #f4eee5;
    font-size: 0.82rem;
    text-transform: uppercase;
  }

  .product-img {
    width: 54px;
    height: 54px;
    object-fit: cover;
    border-radius: 6px;
    background: #fff;
  }

  /* ── Modal Styles ─────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 10050;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    background: rgba(28, 27, 26, 0.55);
  }

  .modal-overlay.is-open {
    display: flex;
  }

  .modal-panel {
    width: min(920px, 100%);
    max-height: 90vh;
    overflow: auto;
    background: var(--surface);
    border-radius: 14px;
    box-shadow: 0 24px 70px rgba(28, 27, 26, 0.28);
  }

  .modal-head {
    position: sticky;
    top: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    background: rgba(255, 253, 248, 0.96);
    border-bottom: 1px solid var(--line);
  }

  .modal-panel form {
    padding: 1.5rem;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1rem;
  }

  .field--wide {
    grid-column: 1 / -1;
  }

  .field label {
    font-size: 0.84rem;
    font-weight: 900;
    text-transform: uppercase;
    display: block;
    margin-bottom: 0.4rem;
  }

  input, select, textarea {
    width: 100%;
    padding: 0.75rem;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: #fff;
    font: inherit;
  }

  .upload-btn {
    padding: 0.5rem 0.75rem;
    background: #f4eee5;
    border: 1px solid var(--line);
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 0.4rem;
    font-size: 0.8rem;
    font-weight: bold;
  }

  /* ── GitHub Config Panel ─────────────────────────── */
  .github-config {
    display: none;
    padding: 1.5rem;
    background: #f6f8fa;
    border: 1px solid var(--line);
    border-radius: 10px;
    margin-bottom: 1rem;
  }

  .github-config.is-open {
    display: block;
  }

  .github-config h3 {
    margin-top: 0;
  }

  @media (max-width: 780px) {
    .toolbar, .form-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <div class="logo">BONDS MALL</div>
    </div>
    <div class="header-actions">
      <button class="btn btn--github" id="githubConfigBtn">GitHub Sync</button>
    </div>
  </header>

  <main class="page">
    <div class="page-head">
      <div>
        <h1>Inventory</h1>
        <p class="page-subtitle" id="inventoryCount">Loading products...</p>
      </div>
    </div>

    <!-- GitHub Configuration Panel -->
    <div class="github-config" id="githubConfigPanel">
      <h3>GitHub Synchronization Settings</h3>
      <p style="font-size: 0.85rem; color: var(--muted); margin-bottom: 1rem;">
        Provide a Personal Access Token (classic) with 'repo' scope to enable automatic saving to GitHub.
      </p>
      <div class="form-grid">
        <div class="field">
          <label for="ghToken">Personal Access Token</label>
          <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx">
        </div>
        <div class="field">
          <label for="ghRepo">Repository (owner/repo)</label>
          <input type="text" id="ghRepo" placeholder="username/repository">
        </div>
        <div class="field">
          <label for="ghBranch">Branch</label>
          <input type="text" id="ghBranch" value="main">
        </div>
        <div class="field">
          <label for="ghPath">File Path</label>
          <input type="text" id="ghPath" value="products.js">
        </div>
      </div>
      <div style="margin-top: 1rem; display: flex; gap: 0.5rem;">
        <button class="btn btn--primary" id="saveGhConfig">Save Config</button>
        <button class="btn" id="testGhConn">Test Connection</button>
      </div>
    </div>

    <div class="toolbar">
      <input type="search" id="bulkSearch" class="toolbar-search" placeholder="Search inventory..." />
      <button class="btn" id="exportProductsBtn">Export</button>
      <button class="btn btn--primary" id="addProductBtn">Add Product</button>
    </div>

    <p class="status" id="statusMessage"></p>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Price</th>
            <th>Category</th>
            <th>Age Group</th>
            <th>Gender</th>
            <th>Inventory</th>
            <th>SKU</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="productTableBody"></tbody>
      </table>
    </div>
  </main>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="productModal">
    <section class="modal-panel">
      <div class="modal-head">
        <h2 class="modal-title" id="modalTitle">Add Product</h2>
        <div class="modal-actions">
          <button class="btn btn--primary" id="saveProductBtn" type="submit" form="productForm">Save</button>
          <button class="btn" id="closeModalBtn">Cancel</button>
        </div>
      </div>
      <form id="productForm">
        <div class="form-grid">
          <div class="field">
            <label>ID</label>
            <input type="number" name="productId" required>
          </div>
          <div class="field">
            <label>SKU</label>
            <input type="text" name="sku">
          </div>
          <div class="field field--wide">
            <label>Name</label>
            <input type="text" name="productName" required>
          </div>
          <div class="field">
            <label>Category</label>
            <select name="category" required>
              <option value="accessories">Accessories</option>
              <option value="men">Men's</option>
              <option value="women">Women's</option>
              <option value="electronics">Electronics</option>
              <option value="homeandappliances">Home & Appliances</option>
              <option value="jewelry">Jewelry</option>
            </select>
          </div>
          <div class="field">
            <label>Product Type</label>
            <input type="text" name="productType">
          </div>
          <div class="field">
            <label>Age Group</label>
            <select name="ageGroup">
              <option value="Adult">Adult</option>
              <option value="Kids">Kids</option>
            </select>
          </div>
          <div class="field">
            <label>Gender</label>
            <select name="gender">
              <option value="Unisex">Unisex</option>
              <option value="Men">Men</option>
              <option value="Women">Women</option>
            </select>
          </div>
          <div class="field">
            <label>Retail Price</label>
            <input type="number" name="retailPrice" step="0.01" required>
          </div>
          <div class="field">
            <label>Sale Price</label>
            <input type="number" name="salePrice" step="0.01" required>
          </div>
          <div class="field">
            <label>Inventory</label>
            <input type="number" name="inventory" value="1">
          </div>
          <div class="field field--wide">
            <label>Main Image</label>
            <button type="button" class="upload-btn" onclick="document.getElementById('mainUpload').click()">Upload Image</button>
            <input type="file" id="mainUpload" accept="image/*" style="display:none" onchange="handleFile(this, 'imageInput')">
            <input type="url" id="imageInput" name="image" placeholder="Image URL" required>
          </div>
          <div class="field field--wide">
            <label>Gallery Images (comma separated)</label>
            <button type="button" class="upload-btn" onclick="document.getElementById('galleryUpload').click()">Upload Image</button>
            <input type="file" id="galleryUpload" accept="image/*" style="display:none" onchange="handleFile(this, 'imagesInput', true)">
            <input type="text" id="imagesInput" name="images" placeholder="URL1, URL2">
          </div>
          <div class="field field--wide">
            <label>Description</label>
            <textarea name="description" required></textarea>
          </div>
        </div>
      </form>
    </section>
  </div>

  <script src="products.js"></script>
  <script>
    let productList = window.products || [];
    let editingIndex = null;
    let ghConfig = JSON.parse(localStorage.getItem('ghConfig') || '{}');

    const els = {
      tableBody: document.getElementById('productTableBody'),
      count: document.getElementById('inventoryCount'),
      status: document.getElementById('statusMessage'),
      modal: document.getElementById('productModal'),
      form: document.getElementById('productForm'),
      configPanel: document.getElementById('githubConfigPanel'),
      configBtn: document.getElementById('githubConfigBtn')
    };

    function handleFile(input, targetId, isGallery = false) {
      const file = input.files[0];
      if (file) {
        const target = document.getElementsByName(targetId)[0] || document.getElementById(targetId);
        const path = `product_images/${file.name}`;
        if (isGallery) {
          target.value = target.value ? `${target.value}, ${path}` : path;
        } else {
          target.value = path;
        }
      }
    }

    function setStatus(msg, type = 'neutral') {
      els.status.textContent = msg;
      els.status.style.color = type === 'error' ? 'var(--warn)' : type === 'success' ? 'var(--good)' : 'var(--muted)';
    }

    function render() {
      const query = document.getElementById('bulkSearch').value.toLowerCase();
      const filtered = productList.filter(p => p.name.toLowerCase().includes(query));
      els.count.textContent = `${filtered.length} products`;
      els.tableBody.innerHTML = filtered.map((p, i) => `
        <tr>
          <td><img src="${Array.isArray(p.image) ? p.image[0] : p.image}" class="product-img"></td>
          <td>${p.name}</td>
          <td>$${(p['sale price'] || p['retail price']).toFixed(2)}</td>
          <td>${p.category}</td>
          <td>${p.age_group || 'Adult'}</td>
          <td>${p.gender || 'Unisex'}</td>
          <td>${p.inventory || 0}</td>
          <td>${p.sku || ''}</td>
          <td>
            <button onclick="editProduct(${i})">Edit</button>
            <button onclick="deleteProduct(${i})" style="color:var(--warn)">Delete</button>
          </td>
        </tr>
      `).join('');
    }

    function editProduct(i) {
      editingIndex = i;
      const p = productList[i];
      document.getElementById('modalTitle').textContent = 'Edit Product';
      const f = els.form;
      f.productId.value = p.id;
      f.sku.value = p.sku || '';
      f.productName.value = p.name;
      f.category.value = p.category;
      f.productType.value = p.productType || '';
      f.ageGroup.value = p.age_group || 'Adult';
      f.gender.value = p.gender || 'Unisex';
      f.retailPrice.value = p['retail price'];
      f.salePrice.value = p['sale price'];
      f.inventory.value = p.inventory || 1;
      f.image.value = Array.isArray(p.image) ? p.image[0] : p.image;
      f.images.value = (p.images || []).join(', ');
      f.description.value = p.description;
      els.modal.classList.add('is-open');
    }

    function deleteProduct(i) {
      if (confirm('Delete this product?')) {
        productList.splice(i, 1);
        saveAndSync();
      }
    }

    async function saveAndSync() {
      render();
      if (ghConfig.token && ghConfig.repo) {
        await syncToGitHub();
      } else {
        setStatus('Saved locally. Connect GitHub for auto-sync.', 'neutral');
      }
    }

    async function syncToGitHub() {
      setStatus('Syncing to GitHub...', 'neutral');
      const { token, repo, branch, path } = ghConfig;
      const url = `https://api.github.com/repos/${repo}/contents/${path}`;
      const content = `var products = ${JSON.stringify(productList, null, 2)};`;
      
      try {
        // 1. Get current file SHA
        const getRes = await fetch(`${url}?ref=${branch}`, {
          headers: { 'Authorization': `token ${token}` }
        });
        
        let sha = null;
        if (getRes.ok) {
          const data = await getRes.json();
          sha = data.sha;
        }

        // 2. Update file
        const putRes = await fetch(url, {
          method: 'PUT',
          headers: {
            'Authorization': `token ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: `Update inventory: ${new Date().toISOString()}`,
            content: btoa(unescape(encodeURIComponent(content))),
            sha: sha,
            branch: branch
          })
        });

        if (putRes.ok) {
          setStatus('Successfully synced to GitHub!', 'success');
        } else {
          const err = await putRes.json();
          throw new Error(err.message);
        }
      } catch (err) {
        console.error(err);
        setStatus(`GitHub Sync Error: ${err.message}`, 'error');
      }
    }

    els.form.onsubmit = (e) => {
      e.preventDefault();
      const f = new FormData(els.form);
      const data = {
        id: Number(f.get('productId')),
        sku: f.get('sku'),
        name: f.get('productName'),
        category: f.get('category'),
        productType: f.get('productType'),
        age_group: f.get('ageGroup'),
        gender: f.get('gender'),
        'retail price': Number(f.get('retailPrice')),
        'sale price': Number(f.get('salePrice')),
        inventory: Number(f.get('inventory')),
        image: f.get('image'),
        images: f.get('images').split(',').map(s => s.trim()).filter(Boolean),
        description: f.get('description')
      };

      if (editingIndex !== null) productList[editingIndex] = data;
      else productList.push(data);

      els.modal.classList.remove('is-open');
      saveAndSync();
    };

    els.configBtn.onclick = () => els.configPanel.classList.toggle('is-open');
    
    document.getElementById('saveGhConfig').onclick = () => {
      ghConfig = {
        token: document.getElementById('ghToken').value,
        repo: document.getElementById('ghRepo').value,
        branch: document.getElementById('ghBranch').value,
        path: document.getElementById('ghPath').value
      };
      localStorage.setItem('ghConfig', JSON.stringify(ghConfig));
      setStatus('GitHub configuration saved.', 'success');
    };

    document.getElementById('testGhConn').onclick = async () => {
      const { token, repo } = ghConfig;
      if (!token || !repo) return setStatus('Token and Repo required.', 'error');
      setStatus('Testing connection...');
      try {
        const res = await fetch(`https://api.github.com/repos/${repo}`, {
          headers: { 'Authorization': `token ${token}` }
        });
        if (res.ok) setStatus('GitHub connection verified!', 'success');
        else throw new Error('Invalid token or repository.');
      } catch (err) {
        setStatus(err.message, 'error');
      }
    };

    document.getElementById('addProductBtn').onclick = () => {
      editingIndex = null;
      els.form.reset();
      document.getElementById('modalTitle').textContent = 'Add Product';
      els.modal.classList.add('is-open');
    };

    document.getElementById('closeModalBtn').onclick = () => els.modal.classList.remove('is-open');
    document.getElementById('bulkSearch').oninput = render;

    // Load saved config into inputs
    if (ghConfig.token) document.getElementById('ghToken').value = ghConfig.token;
    if (ghConfig.repo) document.getElementById('ghRepo').value = ghConfig.repo;
    if (ghConfig.branch) document.getElementById('ghBranch').value = ghConfig.branch;
    if (ghConfig.path) document.getElementById('ghPath').value = ghConfig.path;

    render();
  </script>
</body>
</html>
