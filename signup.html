<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="site-footer.css">
    <style>
        :root {
            --bg: #fffaf2;
            --surface: #ffffff;
            --line: #e4d6c2;
            --text: #1f1a14;
            --muted: #6f6356;
            --accent: #1d1d1d;
            --ok: #1f7a46;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Trebuchet MS", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            background: radial-gradient(circle at top left, #fff8ea 0%, var(--bg) 55%, #f6ecdd 100%);
            color: var(--text);
            padding: 1rem;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 1rem;
            box-shadow: 0 10px 24px rgba(26, 16, 6, 0.08);
        }

        h4 {
            margin: 0 0 0.3rem;
            font-size: 1.15rem;
        }

        p {
            margin: 0 0 1rem;
            color: var(--muted);
            font-size: 0.9rem;
        }

        form {
            display: grid;
            gap: 0.75rem;
        }

        input, button {
            border-radius: 10px;
            border: 1px solid #d8c6ae;
            padding: 0.75rem 0.85rem;
            font-size: 0.92rem;
        }

        input:focus {
            outline: none;
            border-color: #27221b;
            box-shadow: 0 0 0 3px rgba(39, 34, 27, 0.12);
        }

        button {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            font-weight: 700;
            cursor: pointer;
        }

        .feedback {
            min-height: 1rem;
            color: var(--ok);
            font-size: 0.86rem;
            margin-top: 0.2rem;
        }

        .google-btn {
            width: 100%;
            margin-top: 0.2rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.55rem;
            background: #ffffff;
            color: #1f1f1f;
            border: 1px solid #dadce0;
            font-weight: 700;
        }

        .google-icon {
            width: 18px;
            height: 18px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div id="success-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: #fffdf8; border-radius: 16px; padding: 2rem; text-align: center; max-width: 400px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);">
            <div style="font-size: 3rem; margin-bottom: 1rem; color: #1f7a46;">✓</div>
            <h2 id="success-title" style="margin: 0 0 0.5rem; color: #1f7a46; font-size: 1.5rem;">Account Created!</h2>
            <p id="success-message" style="margin: 0 0 1.5rem; color: #5c5348;">Your account has been created successfully.</p>
            <button id="close-modal-btn" style="background: #212121; color: #fff; border: none; padding: 0.8rem 1.5rem; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 0.95rem;">Got it</button>
        </div>
    </div>

    <section class="panel">
        <h4>Create Account</h4>
        <p>Create account with email/password or use Google from the account drawer.</p>
        <form id="signup-form">
            <input type="text" id="signup-name" placeholder="Full name" required>
            <input type="email" id="signup-email" placeholder="Email" required>
            <input type="password" id="signup-password" placeholder="Password" required>
            <button type="submit">Sign Up</button>
        </form>
        <button id="signup-google-btn" class="google-btn" type="button" aria-label="Sign in with Google">
            <svg class="google-icon" viewBox="0 0 48 48" aria-hidden="true">
                <path fill="#EA4335" d="M24 9.5c3.1 0 5.9 1.1 8.1 3.2l6-6C34.3 3.1 29.5 1 24 1 14.6 1 6.5 6.4 2.6 14.3l7 5.4C11.6 13.5 17.3 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.4c-.5 2.9-2.1 5.4-4.5 7.1l6.9 5.3c4-3.7 6.3-9.2 6.3-16.9z"/>
                <path fill="#FBBC05" d="M9.6 28.3c-.5-1.4-.8-2.8-.8-4.3s.3-2.9.8-4.3l-7-5.4C1 17.3 0 20.6 0 24s1 6.7 2.6 9.7l7-5.4z"/>
                <path fill="#34A853" d="M24 47c6.5 0 12-2.1 16-5.8l-6.9-5.3c-1.9 1.3-4.4 2.1-9.1 2.1-6.7 0-12.4-4-14.4-10.2l-7 5.4C6.5 41.6 14.6 47 24 47z"/>
            </svg>
            <span>Sign In With Google</span>
        </button>
        <p id="signup-feedback" class="feedback" aria-live="polite"></p>
    </section>

    <script>
        function saveCredentials(payload) {
            localStorage.setItem("fc_account_credential", JSON.stringify(payload));
        }

        function saveProfileData(email, name) {
            const profile = {
                username: email.split('@')[0],
                name: name || "User",
                email: email,
                address: "123 Main Street",
                city: "New York",
                state: "NY",
                zip: "10001",
                country: "USA",
                picture: null
            };
            localStorage.setItem("fc_profile", JSON.stringify(profile));
        }

        function showSuccessModal(title, message) {
            document.getElementById("success-title").textContent = title;
            document.getElementById("success-message").textContent = message;
            document.getElementById("success-modal").style.display = "flex";
        }

        function closeSuccessModal() {
            document.getElementById("success-modal").style.display = "none";
        }

        document.getElementById("close-modal-btn").addEventListener("click", closeSuccessModal);
        document.getElementById("success-modal").addEventListener("click", function(e) {
            if (e.target === this) closeSuccessModal();
        });

        document.getElementById("signup-form").addEventListener("submit", function (event) {
            event.preventDefault();

            var name = document.getElementById("signup-name").value.trim();
            var email = document.getElementById("signup-email").value.trim();
            var password = document.getElementById("signup-password").value;

            if (!name || !email || !password) {
                document.getElementById("signup-feedback").textContent = "Please fill in all fields.";
                return;
            }

            var payload = {
                mode: "signup",
                name: name,
                email: email,
                password: password,
                savedAt: new Date().toISOString()
            };

            saveCredentials(payload);
            saveProfileData(email, name);

            showSuccessModal("Account Created!", "Welcome to BONDS MALL! Your account is ready to use.");

            setTimeout(() => {
                document.getElementById("signup-form").reset();
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage({ type: "account-saved", view: "signup", email: email }, window.location.origin);
                }
                closeSuccessModal();
            }, 2000);
        });

        document.getElementById("signup-google-btn").addEventListener("click", function () {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ type: "request-google-auth" }, window.location.origin);
            }
        });
    </script>
</body>
</html>
