<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="site-footer.css">
    <style>
        :root {
            --bg: #fffaf2;
            --surface: #ffffff;
            --line: #e4d6c2;
            --text: #1f1a14;
            --muted: #6f6356;
            --accent: #1d1d1d;
            --ok: #1f7a46;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Trebuchet MS", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            background: radial-gradient(circle at top left, #fff8ea 0%, var(--bg) 55%, #f6ecdd 100%);
            color: var(--text);
            padding: 1rem;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 1rem;
            box-shadow: 0 10px 24px rgba(26, 16, 6, 0.08);
        }

        h4 {
            margin: 0 0 0.3rem;
            font-size: 1.15rem;
        }

        p {
            margin: 0 0 1rem;
            color: var(--muted);
            font-size: 0.9rem;
        }

        form {
            display: grid;
            gap: 0.75rem;
        }

        input, button {
            border-radius: 10px;
            border: 1px solid #d8c6ae;
            padding: 0.75rem 0.85rem;
            font-size: 0.92rem;
        }

        input:focus {
            outline: none;
            border-color: #27221b;
            box-shadow: 0 0 0 3px rgba(39, 34, 27, 0.12);
        }

        button {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            font-weight: 700;
            cursor: pointer;
        }

        .feedback {
            min-height: 1rem;
            color: var(--ok);
            font-size: 0.86rem;
            margin-top: 0.2rem;
        }
    </style>
</head>
<body>
    <div id="success-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); z-index: 1000; display: flex; align-items: center; justify-content: center;">
        <div style="background: #fffdf8; border-radius: 16px; padding: 2rem; text-align: center; max-width: 400px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);">
            <div style="font-size: 3rem; margin-bottom: 1rem; color: #1f7a46;">✓</div>
            <h2 id="success-title" style="margin: 0 0 0.5rem; color: #1f7a46; font-size: 1.5rem;">Welcome Back!</h2>
            <p id="success-message" style="margin: 0 0 1.5rem; color: #5c5348;">Your sign-in was successful.</p>
            <button id="close-modal-btn" style="background: #212121; color: #fff; border: none; padding: 0.8rem 1.5rem; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 0.95rem;">Got it</button>
        </div>
    </div>

    <section class="panel">
        <h4>Welcome Back</h4>
        <p>Sign in with email/password or use Google from the account drawer.</p>
        <form id="signin-form">
            <input type="email" id="signin-email" placeholder="Email" required>
            <input type="password" id="signin-password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>
        <p id="signin-feedback" class="feedback" aria-live="polite"></p>
    </section>

    <script>
        function saveCredentials(payload) {
            localStorage.setItem("fc_account_credential", JSON.stringify(payload));
        }

        function saveProfileData(email, name) {
            const profile = JSON.parse(localStorage.getItem("fc_profile") || JSON.stringify({
                username: email.split('@')[0],
                name: name || "User",
                email: email,
                address: "123 Main Street",
                city: "New York",
                state: "NY",
                zip: "10001",
                country: "USA",
                picture: null
            }));
            profile.email = email;
            profile.username = email.split('@')[0];
            localStorage.setItem("fc_profile", JSON.stringify(profile));
        }

        function showSuccessModal(title, message) {
            document.getElementById("success-title").textContent = title;
            document.getElementById("success-message").textContent = message;
            document.getElementById("success-modal").style.display = "flex";
        }

        function closeSuccessModal() {
            document.getElementById("success-modal").style.display = "none";
        }

        document.getElementById("close-modal-btn").addEventListener("click", closeSuccessModal);
        document.getElementById("success-modal").addEventListener("click", function(e) {
            if (e.target === this) closeSuccessModal();
        });

        document.getElementById("signin-form").addEventListener("submit", function (event) {
            event.preventDefault();

            var email = document.getElementById("signin-email").value.trim();
            var password = document.getElementById("signin-password").value;

            if (!email || !password) {
                document.getElementById("signin-feedback").textContent = "Please fill in all fields.";
                return;
            }

            var payload = {
                mode: "signin",
                email: email,
                password: password,
                savedAt: new Date().toISOString()
            };

            saveCredentials(payload);
            saveProfileData(email, "");
            
            showSuccessModal("Welcome Back!", "You're signed in successfully.");

            setTimeout(() => {
                document.getElementById("signin-form").reset();
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage({ type: "account-saved", view: "signin", email: email }, window.location.origin);
                }
                closeSuccessModal();
            }, 2000);
        });
    </script>
</body>
</html>
